spring:
  config:
    import: optional:file:../.env[.properties]
  application:
    name: sync
  datasource:
    url: jdbc:h2:mem:operations_hub;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        "[format_sql]": true
logging:
  level:
    "[org.hibernate.SQL]": debug

app:
  frontend-url: ${APP_FRONTEND_URL:http://localhost:5173}
