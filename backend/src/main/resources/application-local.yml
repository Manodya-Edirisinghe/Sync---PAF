spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/Sync_pafproject}
    username: ${DB_USERNAME:campus_user}
    password: ${DB_PASSWORD:sync}
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
